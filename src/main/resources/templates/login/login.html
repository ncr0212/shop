<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Pretendard", sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg,
                    #667eea 0%,
                    #764ba2 100%);
        }

        .login-container {
            width: 400px;
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15);
        }

        .login-title {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-title h1 {
            color: #333;
            margin-bottom: 10px;
        }

        .login-title p {
            color: #888;
            font-size: 14px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
        }

        .input-group input {
            width: 100%;
            padding: 14px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 15px;
            transition: 0.3s;
        }

        .input-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 8px rgba(102, 126, 234, 0.3);
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            background: #667eea;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .login-btn:hover {
            background: #5563d6;
        }

        .error-message {
            margin-bottom: 15px;
            padding: 12px;
            border-radius: 8px;
            background: #ffe5e5;
            color: #d63031;
            text-align: center;
        }

        .logout-message {
            margin-bottom: 15px;
            padding: 12px;
            border-radius: 8px;
            background: #e8fff0;
            color: #27ae60;
            text-align: center;
        }

        .footer {
            text-align: center;
            margin-top: 20px;
            color: #888;
            font-size: 13px;
        }
    </style>
</head>

<body>

    <div class="login-container">

        <div class="login-title">
            <h1>🔐 Login</h1>
            <p>서비스에 로그인하세요</p>
        </div>

        <div th:if="${param.error}" class="error-message">
            아이디 또는 비밀번호가 올바르지 않습니다.
        </div>

        <div th:if="${param.logout}" class="logout-message">
            <p>로그아웃되었습니다.</p>

            <div class="logout-actions">
                <a th:href="@{/}" class="home-btn">
                    메인 화면으로 이동
                </a>
            </div>
        </div>
      
        <form th:action="@{/login}" method="post">

            <div class="input-group">
                <label>아이디</label>
                <input type="text" name="username" placeholder="아이디를 입력하세요" required>
            </div>

            <div class="input-group">
                <label>비밀번호</label>
                <input type="password" name="password" placeholder="비밀번호를 입력하세요" required>
            </div>

            <button type="submit" class="login-btn">
                로그인
            </button>

        </form>

        <div class="footer">
            © 2026 My Service
        </div>

    </div>

</body>

</html>
<script>
    const params = new URLSearchParams(location.search);
    //alert(params)
    if (params.get("message") === "needLogin") {
        if (!confirm("로그인이 필요한 서비스입니다.\n로그인 페이지로 이동하시겠습니까?")) {
            history.back();
        }
    } 
</script>
